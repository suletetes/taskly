###############################################################################
# Frontend Deployment Workflow — S3/CloudFront
#
# Deploys the React frontend to S3 and invalidates CloudFront cache.
# Stages: lint → test → build → deploy to S3 → invalidate CloudFront
#
# Requirements: 8.1, 8.5, 5.5
###############################################################################

name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: 'us-east-1'
  NODE_VERSION: '20'

jobs:
  # ─── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run linter
        run: npm run lint
        working-directory: frontend

  # ─── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test -- --run
        working-directory: frontend
        env:
          CI: true

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build production bundle
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.API_GATEWAY_URL }}/api
          VITE_APP_NAME: Taskly
          VITE_APP_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  # ─── Deploy to S3 + CloudFront Invalidation ─────────────────────────────────
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist

      - name: Sync to S3 (hashed assets — long cache)
        run: |
          aws s3 sync dist/assets/ \
            "s3://${{ vars.FRONTEND_BUCKET }}/assets/" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Sync to S3 (index.html — no cache)
        run: |
          aws s3 cp dist/index.html \
            "s3://${{ vars.FRONTEND_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Sync to S3 (other root files)
        run: |
          aws s3 sync dist/ \
            "s3://${{ vars.FRONTEND_BUCKET }}/" \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "public, max-age=3600" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)

          echo "CloudFront invalidation created: ${INVALIDATION_ID}"

          # Wait for invalidation to complete (max 5 minutes)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --id "${INVALIDATION_ID}" || echo "Invalidation still in progress"

      - name: Post deploy summary
        run: |
          echo "## Frontend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Bucket:** ${{ vars.FRONTEND_BUCKET }}" >> $GITHUB_STEP_SUMMARY
          echo "**Distribution:** ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
