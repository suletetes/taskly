###############################################################################
# Infrastructure Deployment Workflow
#
# Deploys Terraform infrastructure on push to main (paths: infrastructure/**)
# Uses OIDC for AWS authentication (no long-lived credentials)
#
# Stages: init → validate → plan → apply
#
# : 8.1, 8.2, 8.6, 8.8
###############################################################################

name: Infrastructure Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write   # Required for OIDC
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.7.0'
  AWS_REGION: 'us-east-1'

jobs:
  # ─── Determine Environment ─────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  # ─── Terraform Plan ─────────────────────────────────────────────────────────
  plan:
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure
        run: |
          terraform init \
            -backend-config="environments/${{ needs.setup.outputs.environment }}/backend.hcl"

      - name: Terraform Validate
        working-directory: infrastructure
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: infrastructure
        run: |
          terraform plan \
            -var-file="environments/${{ needs.setup.outputs.environment }}/terraform.tfvars" \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.setup.outputs.environment }}-${{ github.sha }}
          path: infrastructure/tfplan
          retention-days: 30

      - name: Post plan summary
        if: always()
        working-directory: infrastructure
        run: |
          echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Exit Code:** ${{ steps.plan.outputs.exitcode }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.plan.outputs.exitcode }}" = "0" ]; then
            echo "✅ No changes detected" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.plan.outputs.exitcode }}" = "2" ]; then
            echo "⚠️ Changes detected — apply required" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Plan failed" >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Terraform Apply ────────────────────────────────────────────────────────
  apply:
    runs-on: ubuntu-latest
    needs: [setup, plan]
    if: |
      (github.event_name == 'push' && needs.plan.outputs.plan_exit_code == '2') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure
        run: |
          terraform init \
            -backend-config="environments/${{ needs.setup.outputs.environment }}/backend.hcl"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.setup.outputs.environment }}-${{ github.sha }}
          path: infrastructure

      - name: Terraform Apply
        working-directory: infrastructure
        run: terraform apply -auto-approve tfplan

      - name: Post apply summary
        if: always()
        run: |
          echo "## Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ─── Notify on Failure ──────────────────────────────────────────────────────
  notify-failure:
    runs-on: ubuntu-latest
    needs: [plan, apply]
    if: failure()
    steps:
      - name: Notify team of failure
        run: |
          echo "::error::Infrastructure deployment failed for environment: ${{ needs.setup.outputs.environment }}"
          echo "## ❌ Infrastructure Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
