###############################################################################
# PR Validation Workflow
#
# Runs on pull requests to validate code quality without deploying.
# - Lint and test for both backend and frontend
# - Terraform plan (no apply) for infrastructure changes
# - Notifies team on failure
#
# : 8.3, 8.7
###############################################################################

name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'
  TF_VERSION: '1.7.0'
  AWS_REGION: 'us-east-1'

jobs:
  # ─── Backend Validation ─────────────────────────────────────────────────────
  backend:
    name: Backend (Lint + Test)
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files_url, 'backend') ||
      github.event.pull_request.changed_files > 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Lint
        run: npm run lint
        working-directory: backend

      - name: Unit tests
        run: npm test -- --project=unit
        working-directory: backend
        env:
          NODE_ENV: test

  # ─── Frontend Validation ────────────────────────────────────────────────────
  frontend:
    name: Frontend (Lint + Test)
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files_url, 'frontend') ||
      github.event.pull_request.changed_files > 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Tests
        run: npm test -- --run
        working-directory: frontend
        env:
          CI: true

  # ─── Infrastructure Validation (Plan Only) ─────────────────────────────────
  infrastructure:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files_url, 'infrastructure') ||
      github.event.pull_request.changed_files > 0
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infrastructure
        run: terraform init -backend-config="environments/dev/backend.hcl"

      - name: Terraform Validate
        working-directory: infrastructure
        run: terraform validate

      - name: Terraform Plan (no apply)
        working-directory: infrastructure
        run: |
          terraform plan \
            -var-file="environments/dev/terraform.tfvars" \
            -no-color 2>&1 | tee plan-output.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infrastructure/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...(truncated)' : plan;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  # ─── Notify on Failure ──────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [backend, frontend, infrastructure]
    if: failure()
    steps:
      - name: Post failure comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## ❌ PR Validation Failed\n\nOne or more checks failed. Please review the workflow logs for details.'
            });
